<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100 Men Who Care — Interactive Demo</title>
<style>
/* ── Reset & base ─────────────────────────────────── */
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0a1929;
  color: #fff;
  display: flex; flex-direction: column;
  height: 100vh;
}

/* ── Demo shell ───────────────────────────────────── */
#progress-rail { height:3px; background:#1B3A5C; }
#progress-fill { height:3px; background:#2E86AB; width:0%; transition: width .5s ease; }

#demo-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 32px;
  background: #0d2035;
  border-bottom: 1px solid #1B3A5C;
  flex-shrink: 0;
}
.demo-logo { font-size:13px; font-weight:700; color:#2E86AB; letter-spacing:.5px; }
#scene-meta { display:flex; align-items:center; gap:10px; }
#scene-title { font-size:13px; font-weight:600; color:white; }
.path-tag {
  font-size:9px; font-weight:700; text-transform:uppercase;
  letter-spacing:.8px; padding:2px 8px; border-radius:3px;
  background:#1B3A5C; color:#88c4e8;
}
.path-tag.meeting  { background:#2D3A1B; color:#a8d468; }
.path-tag.email    { background:#3A1B2D; color:#e8a8c8; }
.path-tag.shared   { background:#1B3A2D; color:#68e8b0; }
#step-indicator { font-size:11px; color:#4a7a9b; min-width:70px; text-align:right; }

#demo-body {
  flex:1; display:flex; gap:20px;
  padding: 16px 32px;
  overflow: hidden;
  min-height:0;
}

/* ── Device panel ─────────────────────────────────── */
#device-panel {
  flex:1; display:flex; align-items:center; justify-content:center;
  position:relative; overflow:hidden;
}
#device-content { width:100%; display:flex; align-items:center; justify-content:center; }

/* Transition */
.scene-fade { animation: fadeIn .35s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

/* ── Role panel ───────────────────────────────────── */
#role-panel {
  width: 272px; flex-shrink:0;
  display:flex; flex-direction:column; gap:8px;
  overflow-y:auto;
}
.role-card {
  background:#0d2035; border:1px solid #1B3A5C;
  border-radius:8px; overflow:hidden;
  transition: border-color .2s;
}
.role-card.active { border-color:#2E86AB; }
.role-header {
  display:flex; align-items:center; gap:8px;
  padding:8px 12px;
  font-size:10px; font-weight:700; text-transform:uppercase;
  letter-spacing:.8px;
}
.role-icon { font-size:14px; }
.role-member   .role-header { background:#1B3A5C; color:#88c4e8; }
.role-coord    .role-header { background:#1B3A1B; color:#a8d468; }
.role-beneficiary .role-header { background:#3A1B3A; color:#d4a8e8; }
.role-body { padding:8px 12px; }
.role-body p {
  font-size:10px; color:#8aacbe; line-height:1.5; margin-bottom:4px;
}
.role-body p::before { content:"· "; color:#2E86AB; font-weight:700; }
.role-coord .role-body p::before    { color:#6ab04c; }
.role-beneficiary .role-body p::before { color:#9b59b6; }
.role-body .role-feeling {
  margin-top:6px; padding:5px 8px;
  background:rgba(255,255,255,.04);
  border-radius:4px; font-size:9px;
  color:#6a8aaa; font-style:italic;
  line-height:1.4;
}
.role-feeling::before { content:"\" "; }

/* ── Annotation panel ─────────────────────────────── */
#annotation-bar {
  background:#0d2035; border-top:1px solid #1B3A5C;
  padding:8px 32px; display:flex; align-items:center; gap:12px;
  font-size:11px; color:#6a8aaa; flex-shrink:0;
  min-height:36px;
}
#annotation-bar .ann-icon { font-size:14px; flex-shrink:0; }
#annotation-bar .ann-text { flex:1; line-height:1.4; }
#annotation-bar strong { color:#2E86AB; }

/* ── Footer nav ───────────────────────────────────── */
#demo-footer {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 32px;
  background:#0d2035;
  border-top:1px solid #1B3A5C;
  flex-shrink:0;
}
.nav-btn {
  background:#1B3A5C; color:white; border:none;
  padding:8px 20px; border-radius:6px; font-size:12px; font-weight:600;
  cursor:pointer; transition: background .2s;
}
.nav-btn:hover { background:#2E86AB; }
.nav-btn:disabled { opacity:.3; cursor:default; }
.nav-btn.primary { background:#2E86AB; }
.nav-btn.primary:hover { background:#2478a0; }

#path-dots { display:flex; align-items:center; gap:6px; }
.path-dot {
  width:8px; height:8px; border-radius:50%;
  background:#1B3A5C; cursor:pointer; transition:background .2s;
}
.path-dot.done { background:#4a7a9b; }
.path-dot.active { background:#2E86AB; width:22px; border-radius:4px; }

/* ── Lobby ────────────────────────────────────────── */
.lobby-wrap {
  text-align:center; max-width:860px; margin:0 auto; padding:20px;
}
.lobby-title {
  font-size:28px; font-weight:800; color:white;
  letter-spacing:-.5px; margin-bottom:4px;
}
.lobby-title span { color:#2E86AB; }
.lobby-sub { font-size:14px; color:#4a7a9b; margin-bottom:24px; }
.lobby-stat {
  display:inline-block; background:#1B3A5C; border-radius:8px;
  padding:8px 20px; font-size:13px; color:#88c4e8; margin-bottom:24px;
}
.lobby-stat strong { color:white; font-size:16px; }
.entry-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:20px; }
.entry-card {
  background:#0d2035; border:2px solid #1B3A5C; border-radius:12px;
  padding:20px 16px; cursor:pointer; transition:all .2s; text-align:left;
}
.entry-card:hover { border-color:#2E86AB; transform:translateY(-2px); background:#0f2540; }
.entry-card h3 { font-size:14px; color:white; margin-bottom:6px; }
.entry-card p { font-size:11px; color:#4a7a9b; line-height:1.5; margin-bottom:10px; }
.entry-badge {
  display:inline-block; font-size:9px; font-weight:700;
  text-transform:uppercase; letter-spacing:.6px;
  padding:2px 8px; border-radius:3px;
}
.badge-web     { background:#1B3A5C; color:#88c4e8; }
.badge-meeting { background:#2D3A1B; color:#a8d468; }
.badge-email   { background:#3A1B2D; color:#e8a8c8; }
.entry-icon { font-size:28px; margin-bottom:10px; }
.lobby-roles { display:flex; justify-content:center; gap:12px; }
.lobby-role-tag {
  background:#0d2035; border:1px solid #1B3A5C;
  padding:5px 14px; border-radius:20px; font-size:11px; color:#4a7a9b;
}

/* ── Browser frame ────────────────────────────────── */
.browser-frame {
  background:white; border-radius:8px; overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,.5);
  width:680px; max-height:520px;
  border:1px solid #333;
}
.browser-chrome {
  background:#2b2b2b; padding:8px 12px;
  display:flex; align-items:center; gap:8px;
}
.browser-dot { width:10px; height:10px; border-radius:50%; }
.bd-r { background:#ff5f57; }
.bd-y { background:#ffbd2e; }
.bd-g { background:#28c840; }
.browser-url {
  flex:1; background:#3d3d3d; border-radius:4px;
  padding:3px 10px; font-size:10px; color:#bbb;
  display:flex; align-items:center; gap:6px;
}
.url-lock { font-size:9px; color:#6a6; }
.browser-body { overflow-y:auto; max-height:476px; }

/* Site recreation */
.site-nav {
  background:white; padding:12px 24px;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid #eee;
  position:sticky; top:0; z-index:10;
}
.site-logo { font-size:13px; font-weight:800; color:#1a1a1a; letter-spacing:-.3px; line-height:1.2; }
.site-logo span { display:block; font-size:9px; font-weight:500; color:#666; letter-spacing:1px; text-transform:uppercase; }
.site-nav-links { display:flex; gap:16px; }
.site-nav-links a { font-size:10px; color:#333; text-decoration:none; white-space:nowrap; }
.site-nav-links a:hover { color:#2D8B4E; }
.site-contribute-btn {
  background:#2D8B4E; color:white; border:none; border-radius:4px;
  padding:6px 14px; font-size:11px; font-weight:700; cursor:pointer;
  display:none; /* hidden initially */
  animation: popIn .5s cubic-bezier(.175,.885,.32,1.275) forwards;
}
@keyframes popIn {
  from { transform:scale(0); opacity:0; }
  to   { transform:scale(1); opacity:1; }
}
.site-hero {
  background: linear-gradient(160deg, #1B3A5C 0%, #0d2035 100%);
  padding:32px 24px; color:white; position:relative;
  overflow:hidden;
}
.site-hero::before {
  content:'';
  position:absolute; inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.site-hero-stat {
  font-size:26px; font-weight:800; margin-bottom:4px; position:relative;
}
.site-hero-stat span { color:#2E86AB; }
.site-hero-sub { font-size:12px; color:#88c4e8; margin-bottom:16px; position:relative; }
.site-hero-quote {
  font-size:11px; color:rgba(255,255,255,.65); font-style:italic;
  line-height:1.5; border-left:3px solid #2E86AB; padding-left:10px;
  max-width:400px; position:relative; margin-bottom:16px;
}
.site-hero-cta {
  display:inline-block; background:transparent; color:#2E86AB;
  border:1px solid #2E86AB; padding:7px 16px; border-radius:4px;
  font-size:10px; font-weight:700; text-transform:uppercase;
  letter-spacing:.6px; cursor:pointer; position:relative; margin-right:8px;
}
.site-contribute-hero {
  display:none;
  background:#2D8B4E; color:white; border:none;
  padding:7px 16px; border-radius:4px;
  font-size:10px; font-weight:700; text-transform:uppercase;
  letter-spacing:.6px; cursor:pointer; position:relative;
  animation: popIn .5s cubic-bezier(.175,.885,.32,1.275) forwards;
}
.site-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:#eee; }
.site-cell { background:white; padding:16px; }
.site-cell h4 { font-size:11px; font-weight:700; color:#1a1a1a; margin-bottom:6px; text-transform:uppercase; letter-spacing:.5px; }
.site-cell p  { font-size:10px; color:#666; line-height:1.5; }
.site-footer { background:#1a1a1a; padding:16px 24px; display:flex; justify-content:space-between; align-items:center; }
.site-footer-logo { font-size:11px; font-weight:700; color:white; }
.site-footer-copy { font-size:9px; color:#666; }

/* ── Phone frame ──────────────────────────────────── */
.phone-frame {
  width:260px; background:white; border-radius:30px;
  box-shadow:0 8px 40px rgba(0,0,0,.5);
  border:8px solid #1a1a1a; overflow:hidden;
  position:relative;
}
.phone-notch {
  height:22px; background:#1a1a1a;
  display:flex; align-items:center; justify-content:center;
}
.phone-notch::after { content:''; width:60px; height:12px; background:#333; border-radius:0 0 8px 8px; }
.phone-status {
  background:#f9f9f9; border-bottom:1px solid #eee;
  padding:3px 12px; font-size:8px; color:#888;
  display:flex; justify-content:space-between;
}
.phone-scroll { overflow-y:auto; max-height:420px; background:white; }

/* Phone UI atoms */
.ph-header { background:#1B3A5C; color:white; padding:10px 12px; font-size:11px; font-weight:700; text-align:center; }
.ph-subhead { font-size:9px; color:#888; text-align:center; margin-bottom:8px; padding-top:6px; }
.ph-body { padding:10px 12px; color:#333; }
.ph-charity-card { border:1px solid #ddd; border-radius:6px; padding:8px 10px; margin-bottom:8px; }
.ph-charity-name { font-size:10px; font-weight:700; color:#1B3A5C; margin-bottom:2px; }
.ph-charity-desc { font-size:8px; color:#666; margin-bottom:6px; line-height:1.3; }
.ph-amount-row { display:flex; align-items:center; gap:6px; font-size:9px; color:#888; }
.ph-amount-input { border:1px solid #2D8B4E; border-radius:3px; width:50px; height:18px; font-size:9px; font-weight:700; color:#2D8B4E; text-align:center; background:#e8f5e9; }
.ph-btn { border-radius:5px; padding:8px; font-size:10px; font-weight:700; text-align:center; margin-top:6px; color:white; }
.ph-btn-green  { background:#2D8B4E; }
.ph-btn-blue   { background:#2E86AB; }
.ph-btn-navy   { background:#1B3A5C; }
.ph-btn-ghost  { background:white; color:#1B3A5C; border:1px solid #1B3A5C; }
.ph-divider    { border:none; border-top:1px solid #eee; margin:8px 0; }
.ph-section    { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.4px; color:#2D8B4E; margin-bottom:4px; }
.ph-row { display:flex; justify-content:space-between; align-items:center; padding:4px 0; border-bottom:1px solid #f5f5f5; font-size:9px; }
.ph-badge { font-size:7px; font-weight:700; padding:1px 5px; border-radius:2px; }
.ph-badge-free { background:#e8f5e9; color:#2D8B4E; }
.ph-badge-fee  { background:#fff3e0; color:#E8734A; }
.ph-check { width:14px; height:14px; border-radius:50%; background:#2D8B4E; color:white; font-size:8px; line-height:14px; text-align:center; }
.ph-option { display:flex; align-items:center; gap:6px; padding:4px 0; border-bottom:1px solid #f5f5f5; font-size:9px; }
.ph-radio { width:11px; height:11px; border:1.5px solid #1B3A5C; border-radius:50%; }
.ph-radio.on { background:#1B3A5C; box-shadow:inset 0 0 0 2px white; }
.ph-success-icon { width:40px; height:40px; border-radius:50%; background:#2D8B4E; color:white; font-size:20px; line-height:40px; text-align:center; margin:12px auto; }
.ph-label { font-size:9px; font-weight:700; color:#333; margin-bottom:2px; }
.ph-field { border:1px solid #ddd; border-radius:3px; height:20px; background:#fafafa; margin-bottom:5px; padding:0 6px; font-size:8px; color:#333; display:flex; align-items:center; }

/* ── Email frame ──────────────────────────────────── */
.email-frame {
  width:260px; background:white; border-radius:30px;
  box-shadow:0 8px 40px rgba(0,0,0,.5);
  border:8px solid #1a1a1a; overflow:hidden;
}
.email-inbox { background:#f9f9f9; max-height:440px; overflow-y:auto; }
.email-header-bar { background:#1a1a1a; padding:8px 12px; color:white; font-size:10px; font-weight:700; display:flex; justify-content:space-between; }
.inbox-row { padding:10px 12px; border-bottom:1px solid #e0e0e0; cursor:pointer; background:white; }
.inbox-row:hover { background:#f5f5f5; }
.inbox-row.unread { background:#fff; border-left:3px solid #2E86AB; }
.inbox-from { font-size:9px; font-weight:700; color:#222; margin-bottom:2px; }
.inbox-subj { font-size:9px; font-weight:700; color:#333; margin-bottom:2px; }
.inbox-subj.unread { color:#1B3A5C; }
.inbox-prev { font-size:8px; color:#888; }
.inbox-time { font-size:8px; color:#aaa; float:right; margin-top:-18px; }
.inbox-dot  { width:7px; height:7px; border-radius:50%; background:#2E86AB; float:left; margin-right:6px; margin-top:2px; }

.email-open { padding:10px 12px; max-height:440px; overflow-y:auto; }
.em-header  { border-bottom:1px solid #eee; padding-bottom:8px; margin-bottom:8px; }
.em-subject { font-size:11px; font-weight:700; color:#1B3A5C; margin-bottom:4px; line-height:1.3; }
.em-from    { font-size:8px; color:#888; }
.em-body    { font-size:9px; color:#444; line-height:1.5; margin-bottom:8px; }
.em-charity { background:#f5f5f5; border-radius:4px; padding:6px 8px; margin-bottom:5px; font-size:9px; }
.em-charity strong { color:#1B3A5C; font-size:9px; }
.em-contribute-btn { background:#2D8B4E; color:white; border-radius:5px; padding:8px; font-size:10px; font-weight:700; text-align:center; margin:8px 0; cursor:pointer; }
.em-qr { width:50px; height:50px; background:#eee; border:1px solid #ddd; margin:4px auto; display:flex; align-items:center; justify-content:center; font-size:8px; color:#aaa; border-radius:2px; }

/* ── Meeting room scene ───────────────────────────── */
.room-scene {
  width:680px; background:#0a1929; border-radius:12px;
  overflow:hidden; box-shadow:0 8px 40px rgba(0,0,0,.6);
  padding:0;
}
.room-stage {
  background: linear-gradient(to bottom, #1B3A5C, #0d2035);
  padding:20px; text-align:center; position:relative;
}
.stage-screen {
  background:#0a1929; border:2px solid #2E86AB; border-radius:4px;
  padding:12px; margin:0 auto 12px; width:280px;
  display:flex; flex-direction:column; align-items:center; gap:6px;
}
.stage-screen-title { font-size:10px; color:#2E86AB; font-weight:700; letter-spacing:1px; text-transform:uppercase; }
.stage-qr {
  width:70px; height:70px; background:white; padding:4px; border-radius:2px;
  display:grid; grid-template-columns:repeat(7,1fr); gap:1px;
}
.qr-c { background:#1a1a1a; border-radius:.5px; }
.qr-w { background:white; }
.stage-screen-url { font-size:8px; color:#4a7a9b; }
.stage-speaker {
  width:32px; height:52px; margin:0 auto;
  display:flex; flex-direction:column; align-items:center; gap:2px;
}
.speaker-head { width:18px; height:18px; border-radius:50%; background:#4a7a9b; }
.speaker-body { width:28px; flex:1; background:#4a7a9b; border-radius:10px 10px 0 0; }
.room-audience { background:#0a1929; padding:12px 20px; }
.audience-label { font-size:9px; color:#4a7a9b; text-align:center; margin-bottom:10px; text-transform:uppercase; letter-spacing:.8px; }
.audience-grid { display:grid; grid-template-columns:repeat(12,1fr); gap:5px; }
.audience-dot { width:16px; height:16px; border-radius:50%; background:#1B3A5C; }
.audience-dot.scanning { background:#2D8B4E; animation: pulse 1s ease infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.5;} }
.room-caption { font-size:10px; color:#4a7a9b; text-align:center; padding:8px; font-style:italic; }

/* ── Inject overlay ───────────────────────────────── */
.inject-overlay {
  position:absolute; bottom:12px; left:50%; transform:translateX(-50%);
  background:#0d2035; border:1px solid #2E86AB; border-radius:8px;
  padding:10px 16px; font-size:11px; color:#88c4e8;
  display:flex; align-items:center; gap:10px; box-shadow:0 4px 20px rgba(46,134,171,.3);
  cursor:pointer; transition:background .2s; white-space:nowrap;
}
.inject-overlay:hover { background:#1B3A5C; }
.inject-arrow { color:#2E86AB; font-size:16px; animation:bounceLeft 1s ease infinite; }
@keyframes bounceLeft { 0%,100%{transform:translateX(0);} 50%{transform:translateX(-4px);} }
.highlight-pulse {
  box-shadow:0 0 0 3px rgba(46,170,68,.6);
  animation:glow 1.5s ease infinite;
}
@keyframes glow { 0%,100%{box-shadow:0 0 0 2px rgba(46,170,68,.6);} 50%{box-shadow:0 0 0 5px rgba(46,170,68,.3);} }

/* ── DAF scene ────────────────────────────────────── */
.daf-sponsors { display:flex; flex-direction:column; gap:4px; margin:6px 0; }
.daf-sponsor-btn { background:white; border:1px solid #ddd; border-radius:4px; padding:5px 8px; font-size:9px; color:#1B3A5C; font-weight:600; cursor:pointer; text-align:left; display:flex; align-items:center; gap:6px; }
.daf-sponsor-btn.selected { border-color:#2D8B4E; background:#e8f5e9; }

/* ── Lobby path toggle ───────────────────────────── */
.path-selector { display:none; /* used if we want in-demo path switching */ }
</style>
</head>
<body>

<div id="progress-rail"><div id="progress-fill"></div></div>

<div id="demo-header">
  <div class="demo-logo">100 Men Who Care · Interactive Demo</div>
  <div id="scene-meta">
    <span id="scene-title">Welcome</span>
    <span id="path-tag-el" class="path-tag"></span>
  </div>
  <div id="step-indicator"></div>
</div>

<div id="demo-body">
  <div id="device-panel"><div id="device-content"></div></div>
  <div id="role-panel">
    <div class="role-card role-member" id="rc-member">
      <div class="role-header"><span class="role-icon">&#128100;</span> Member</div>
      <div class="role-body" id="rc-member-body"><p>Select a path to begin</p></div>
    </div>
    <div class="role-card role-coord" id="rc-coord">
      <div class="role-header"><span class="role-icon">&#128203;</span> Coordinator</div>

/* ═══════════════════════════════════════════════════
   Render engine
   ═══════════════════════════════════════════════════ */

function renderDevice(scene) {
  switch(scene.device) {
    case 'lobby':           return renderLobby();
    case 'browser-before':  return renderBrowserBefore();
    case 'browser-after':   return renderBrowserAfter();
    case 'room':            return renderRoom();
    case 'phone-scan':      return renderPhoneScan();
    case 'email-inbox':     return renderEmailInbox();
    case 'email-open':      return renderEmailOpen();
    case 'phone-contribute':return renderPhone(CONTRIBUTE_HTML);
    case 'phone-payment':   return renderPhone(PAYMENT_HTML);
    case 'phone-daf':       return renderPhone(DAF_HTML);
    case 'phone-confirm':        return renderPhone(CONFIRM_HTML);
    case 'setup-invite':         return renderEmailFrame(PROFILE_INVITE_HTML);
    case 'phone-profile-setup':  return renderPhone(PROFILE_SETUP_HTML);
    case 'phone-profile-done':   return renderPhone(PROFILE_DONE_HTML);
    default:                return '<p style="color:#4a7a9b">Scene not found</p>';
  }
}

function renderRoles(scene) {
  ['member','coord','beneficiary'].forEach(role => {
    const items = scene.roles[role] || [];
    const html  = items.map(t => `<p>${t}</p>`).join('');
    document.getElementById(`rc-${role}-body`).innerHTML = html;
  });
}

function renderPathDots(path, idx) {
  const p = paths[path];
  document.getElementById('path-dots').innerHTML = p.map((id, i) => {
    let cls = 'path-dot';
    if (i < idx) cls += ' done';
    if (i === idx) cls += ' active';
    return `<div class="${cls}" onclick="goIdx(${i})" title="${scenes[id]?.title||id}"></div>`;
  }).join('');
}

function renderScene(sceneId) {
  const scene = scenes[sceneId];
  if (!scene) return;

  const dc = document.getElementById('device-content');
  dc.innerHTML = renderDevice(scene);
  dc.className = 'scene-fade';

  document.getElementById('scene-title').textContent = scene.title;

  const tagEl = document.getElementById('path-tag-el');
  tagEl.textContent = scene.pathTag;
  tagEl.className   = 'path-tag ' + (scene.pathClass||'');
  if (!scene.pathTag) tagEl.style.display = 'none'; else tagEl.style.display = '';

  const path   = paths[currentPath];
  const pct    = currentIdx === 0 ? 0 : Math.round((currentIdx / (path.length - 1)) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('step-indicator').textContent =
    currentIdx === 0 ? '' : `Step ${currentIdx} of ${path.length - 1}`;

  renderRoles(scene);
  renderPathDots(currentPath, currentIdx);

  document.getElementById('ann-text').innerHTML = scene.annotation;
  document.getElementById('back-btn').disabled = (currentIdx === 0);
  document.getElementById('next-btn').disabled = (scene.next === null && currentIdx === path.length - 1);
  document.getElementById('next-btn').textContent = (currentIdx === path.length - 1) ? 'Start Over' : 'Next \u2192';
}

/* ═══════════════════════════════════════════════════
   Navigation
   ═══════════════════════════════════════════════════ */

function startPath(path) {
  currentPath = path;
  currentIdx  = 1;
  renderScene(paths[currentPath][currentIdx]);
}

function navNext() {
  const path = paths[currentPath];
  if (currentIdx >= path.length - 1) { goScene('lobby'); currentIdx = 0; return; }
  currentIdx++;
  renderScene(path[currentIdx]);
}

function navBack() {
  if (currentIdx <= 0) return;
  currentIdx--;
  renderScene(paths[currentPath][currentIdx]);
}

function goScene(id) {
  const path = paths[currentPath];
  const idx  = path.indexOf(id);
  if (idx >= 0) { currentIdx = idx; renderScene(id); }
}

function goIdx(idx) {
  currentIdx = idx;
  renderScene(paths[currentPath][idx]);
}

function goContribute() { goScene('contribute'); }

function doInject() {
  // Animate the donate buttons appearing in the browser frame
  const navBtn  = document.getElementById('site-nav-btn');
  const heroBtn = document.getElementById('site-hero-btn');
  if (navBtn)  { navBtn.style.display  = 'inline-block'; }
  if (heroBtn) { heroBtn.style.display = 'inline-block'; }
  const overlay = document.getElementById('inject-btn');
  if (overlay) overlay.style.display = 'none';
  // Update annotation
  document.getElementById('ann-text').innerHTML =
    '<strong>There it is.</strong> The Contribute button is now live in the nav and hero. One click and members are in the contribute flow. Ready to see it?';
}

/* ── Boot ── */
renderScene('lobby');
